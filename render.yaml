# Render Blueprint — provisions the whole stack in one go.
# Deploy: Render Dashboard -> New -> Blueprint -> select this repo.
# See DEPLOY.md for the full walkthrough.

databases:
  - name: albums-db
    plan: free

services:
  - name: albums-cache
    type: keyvalue
    plan: free
    # Empty allow-list = only other Render services (our web app) can connect.
    ipAllowList: []

  - name: spotify-album-api
    type: web
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: albums-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: albums-cache
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      # Secrets / values you set in the Render dashboard at deploy time:
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: SPOTIFY_REDIRECT_URI
        sync: false
